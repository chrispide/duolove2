<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuoLove - Historias</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="stories-container">
        <div class="navbar">
            <div class="logo" style="margin: 0;">
                <h2 style="font-size: 1.5rem;">Duo<span>Love</span></h2>
            </div>
            <div class="nav-links">
                <a href="profile.html">Perfil</a>
                <a href="stories.html">Historias</a>
                <a href="#" id="logoutBtn">Cerrar Sesión</a>
            </div>
        </div>
        
        <div class="stories-grid">
            <div class="feed" id="feed">
                <!-- Las historias se cargarán aquí -->
            </div>
            
            <div class="sidebar">
                <div class="publish-card">
                    <h3><i class="fas fa-pen-fancy"></i> Escribir nueva historia</h3>
                    <textarea id="storyText" rows="4" placeholder="¿Qué capítulo escribieron hoy? Comparte tu momento..."></textarea>
                    <button id="publishBtn" class="btn">📖 Publicar historia</button>
                </div>
                
                <div class="challenge-card">
                    <h3><i class="fas fa-trophy"></i> Reto del Día</h3>
                    <div class="challenge-text" id="challengeText">
                        Cargando reto...
                    </div>
                    <button id="newChallengeBtn" class="btn btn-secondary" style="font-size: 0.9rem;">
                        🔄 Nuevo Reto
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const challenges = [
            "Escriban un poema de 4 líneas sobre el café de la mañana",
            "Describe el momento más divertido que han vivido juntos",
            "Escribe una carta de amor de 50 palabras",
            "¿Cuál es tu recuerdo favorito con tu pareja?",
            "Completa la frase: 'Nuestro amor es como...'",
            "Escribe un microcuento de terror romántico",
            "¿Qué canción describe su relación? ¿Por qué?",
            "Describe su primer beso en 3 oraciones",
            "Escribe una lista de 5 cosas que amas de tu pareja",
            "¿Cómo sería su viaje soñado juntos?"
        ];
        
        function getRandomChallenge() {
            return challenges[Math.floor(Math.random() * challenges.length)];
        }
        
        function loadStories() {
            const stories = JSON.parse(localStorage.getItem('stories')) || [];
            const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
            const feed = document.getElementById('feed');
            
            if (stories.length === 0) {
                feed.innerHTML = '<div style="text-align: center; padding: 40px; background: white; border-radius: 16px;">✨ No hay historias aún. ¡Sé el primero en publicar! ✨</div>';
                return;
            }
            
            stories.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            feed.innerHTML = stories.map(story => {
                const isLiked = story.likedBy && story.likedBy.includes(currentUser.email);
                return `
                    <div class="story-card" data-id="${story.id}">
                        <div class="story-header">
                            <img src="${story.avatar || 'https://via.placeholder.com/50'}" class="story-avatar" alt="Avatar">
                            <div class="story-meta">
                                <h3>${story.coupleName}</h3>
                                <div class="story-date">${new Date(story.timestamp).toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</div>
                            </div>
                        </div>
                        <div class="story-content">
                            ${story.text}
                        </div>
                        <button class="like-btn ${isLiked ? 'liked' : ''}" data-id="${story.id}">
                            <i class="fas fa-heart"></i> <span class="likes-count">${story.likes || 0}</span>
                        </button>
                    </div>
                `;
            }).join('');
            
            // Agregar event listeners a los botones de like
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const storyId = this.getAttribute('data-id');
                    likeStory(storyId);
                });
            });
        }
        
        function likeStory(storyId) {
            const stories = JSON.parse(localStorage.getItem('stories')) || [];
            const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
            const storyIndex = stories.findIndex(s => s.id == storyId);
            
            if (storyIndex !== -1) {
                if (!stories[storyIndex].likedBy) {
                    stories[storyIndex].likedBy = [];
                }
                
                if (!stories[storyIndex].likedBy.includes(currentUser.email)) {
                    stories[storyIndex].likedBy.push(currentUser.email);
                    stories[storyIndex].likes = (stories[storyIndex].likes || 0) + 1;
                    localStorage.setItem('stories', JSON.stringify(stories));
                    loadStories();
                }
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
            
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            
            // Cargar reto aleatorio
            document.getElementById('challengeText').textContent = getRandomChallenge();
            
            // Cargar historias
            loadStories();
            
            // Publicar historia
            document.getElementById('publishBtn').addEventListener('click', function() {
                const storyText = document.getElementById('storyText').value.trim();
                
                if (!storyText) {
                    alert('Por favor escribe algo antes de publicar');
                    return;
                }
                
                const stories = JSON.parse(localStorage.getItem('stories')) || [];
                const newStory = {
                    id: Date.now(),
                    coupleName: currentUser.coupleName,
                    email: currentUser.email,
                    text: storyText,
                    timestamp: new Date().toISOString(),
                    likes: 0,
                    likedBy: [],
                    avatar: currentUser.avatar || null
                };
                
                stories.push(newStory);
                localStorage.setItem('stories', JSON.stringify(stories));
                
                document.getElementById('storyText').value = '';
                loadStories();
                
                // Mostrar mensaje de éxito
                const successMsg = document.createElement('div');
                successMsg.textContent = '¡Historia publicada con éxito!';
                successMsg.style.cssText = 'position: fixed; top: 20px; right: 20px; background: var(--success); color: white; padding: 10px 20px; border-radius: 8px; z-index: 1000;';
                document.body.appendChild(successMsg);
                setTimeout(() => successMsg.remove(), 3000);
            });
            
            // Nuevo reto
            document.getElementById('newChallengeBtn').addEventListener('click', function() {
                document.getElementById('challengeText').textContent = getRandomChallenge();
            });
            
            // Logout
            document.getElementById('logoutBtn').addEventListener('click', function(e) {
                e.preventDefault();
                sessionStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            });
        });
    </script>
</body>
</html>
