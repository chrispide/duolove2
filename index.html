<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuoLove - Iniciar Sesión</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Estilos adicionales para la página de inicio */
        .hero-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .hero-section h1 {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 10px;
        }
        
        .hero-section p {
            color: var(--gray);
        }
        
        .features-mini {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .feature-mini {
            text-align: center;
            padding: 10px;
        }
        
        .feature-mini i {
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 5px;
        }
        
        .feature-mini span {
            font-size: 0.8rem;
            color: var(--gray);
            display: block;
        }
        
        @media (max-width: 768px) {
            .features-mini {
                gap: 10px;
            }
            
            .feature-mini i {
                font-size: 1.2rem;
            }
            
            .feature-mini span {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="hero-section">
            <div class="logo">
                <h2>Duo<span>Love</span></h2>
            </div>
            <h1>Bienvenido a DuoLove</h1>
            <p>La red social para parejas creativas</p>
            
            <div class="features-mini">
                <div class="feature-mini">
                    <i class="fas fa-pen-fancy"></i>
                    <span>Escribe juntos</span>
                </div>
                <div class="feature-mini">
                    <i class="fas fa-heart"></i>
                    <span>Comparte amor</span>
                </div>
                <div class="feature-mini">
                    <i class="fas fa-trophy"></i>
                    <span>Retos diarios</span>
                </div>
                <div class="feature-mini">
                    <i class="fas fa-users"></i>
                    <span>Conecta</span>
                </div>
            </div>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuario o Correo electrónico</label>
                <input type="text" id="username" name="username" required placeholder="spider / tupareja@ejemplo.com">
                <div id="usernameError" class="error-message"></div>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required placeholder="Ingresa tu contraseña">
                    <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                </div>
                <div id="passwordError" class="error-message"></div>
            </div>
            
            <div class="options" style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Recuérdame</label>
                </div>
                <div class="forgot-password">
                    <a href="#" id="forgotPassword" style="color: var(--accent);">¿Olvidaste tu contraseña?</a>
                </div>
            </div>
            
            <button type="submit" class="btn">Ingresar</button>
            
            <div class="login-link">
                ¿No tienes una cuenta? <a href="register.html">Regístrate aquí</a>
            </div>
            
            <div id="loginError" class="error-message"></div>
            <div id="loginSuccess" class="success-message"></div>
        </form>
    </div>

    <script>
        // Función para hashear contraseña
        function hashPassword(password) {
            let hash = btoa(password + "duolove_salt");
            return hash.split('').reverse().join('');
        }
        
        // Usuario administrador especial
        const ADMIN_USER = {
            username: "spider",
            passwordHash: hashPassword("245824588"),
            email: "admin@duolove.com",
            coupleName: "Administrador DuoLove",
            relationshipType: "standard",
            joinDate: new Date().toISOString(),
            avatar: null,
            isAdmin: true
        };
        
        // Inicializar usuario admin si no existe
        function initAdminUser() {
            let registeredUsers = JSON.parse(localStorage.getItem('registeredUsers')) || [];
            const adminExists = registeredUsers.some(user => user.username === "spider" || user.email === "admin@duolove.com");
            
            if (!adminExists) {
                registeredUsers.push(ADMIN_USER);
                localStorage.setItem('registeredUsers', JSON.stringify(registeredUsers));
                console.log("✅ Usuario administrador 'spider' creado");
            } else {
                // Asegurar que el admin tenga la estructura correcta
                const adminIndex = registeredUsers.findIndex(user => user.username === "spider");
                if (adminIndex !== -1) {
                    registeredUsers[adminIndex].isAdmin = true;
                    registeredUsers[adminIndex].username = "spider";
                    localStorage.setItem('registeredUsers', JSON.stringify(registeredUsers));
                }
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            // Crear usuario admin al cargar
            initAdminUser();
            
            const loginForm = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const rememberCheckbox = document.getElementById('remember');
            const loginError = document.getElementById('loginError');
            const loginSuccess = document.getElementById('loginSuccess');
            
            // Mostrar/Ocultar contraseña
            const togglePassword = document.getElementById('togglePassword');
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                this.classList.toggle('fa-eye-slash');
            });
            
            // Verificar usuario recordado
            const rememberedUser = JSON.parse(localStorage.getItem('rememberedUser'));
            if (rememberedUser && rememberedUser.username) {
                usernameInput.value = rememberedUser.username;
                rememberCheckbox.checked = rememberedUser.remember;
            }
            
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                loginError.style.display = 'none';
                loginSuccess.style.display = 'none';
                
                const username = usernameInput.value.trim();
                const password = passwordInput.value;
                const remember = rememberCheckbox.checked;
                
                if (!username || !password) {
                    loginError.textContent = 'Por favor completa todos los campos';
                    loginError.style.display = 'block';
                    return;
                }
                
                const registeredUsers = JSON.parse(localStorage.getItem('registeredUsers')) || [];
                const hashedInputPassword = hashPassword(password);
                
                // Buscar por username (spider) o por email
                const user = registeredUsers.find(user => 
                    user.username === username || 
                    user.email === username
                );
                
                if (!user) {
                    loginError.textContent = 'Usuario o correo no registrado';
                    loginError.style.display = 'block';
                    return;
                }
                
                // Verificar contraseña (usar passwordHash)
                const storedPassword = user.passwordHash || user.password;
                if (storedPassword !== hashedInputPassword) {
                    loginError.textContent = 'Contraseña incorrecta';
                    loginError.style.display = 'block';
                    return;
                }
                
                if (remember) {
                    localStorage.setItem('rememberedUser', JSON.stringify({ username, remember: true }));
                } else {
                    localStorage.removeItem('rememberedUser');
                }
                
                // Guardar sesión
                sessionStorage.setItem('currentUser', JSON.stringify({
                    username: user.username || user.email,
                    email: user.email,
                    coupleName: user.coupleName,
                    relationshipType: user.relationshipType,
                    joinDate: user.joinDate,
                    avatar: user.avatar || null,
                    isAdmin: user.isAdmin || false,
                    passwordHash: user.passwordHash
                }));
                
                loginSuccess.textContent = `¡Bienvenido ${user.coupleName}! Redirigiendo...`;
                loginSuccess.style.display = 'block';
                
                setTimeout(() => {
                    if (user.isAdmin || user.username === "spider") {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'profile.html';
                    }
                }, 2000);
            });
            
            // Olvidé mi contraseña
            document.getElementById('forgotPassword').addEventListener('click', function(e) {
                e.preventDefault();
                const username = usernameInput.value.trim();
                if (!username) {
                    loginError.textContent = 'Ingresa tu usuario o correo para recuperar contraseña';
                    loginError.style.display = 'block';
                    return;
                }
                loginSuccess.textContent = `Se ha enviado un enlace de recuperación a tu correo asociado`;
                loginSuccess.style.display = 'block';
            });
        });
    </script>
</body>
</html>
